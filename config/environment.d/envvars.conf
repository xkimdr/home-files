# ==============================================================================
# 1. Core XDG Base Directories (Must be defined first)
# ==============================================================================
XDG_CONFIG_HOME="$HOME/.config"
XDG_CACHE_HOME="$HOME/.cache"
XDG_DATA_HOME="$HOME/.local/share"
XDG_STATE_HOME="$HOME/.local/state"

# ==============================================================================
# 2. XDG-Dependent Tool Configurations
# ==============================================================================

# Android & .NET
DOTNET_CLI_HOME="$XDG_DATA_HOME/dotnet"
ANDROID_HOME="$XDG_DATA_HOME/android-sdk"
ANDROID_USER_HOME="$XDG_DATA_HOME/android"

# Bash
HISTFILE="$XDG_STATE_HOME/bash/history"

# Go
GOPATH="$XDG_DATA_HOME/go"
GOMODCACHE="$XDG_CACHE_HOME/go/mod"

# GPG
GNUPGHOME="$XDG_DATA_HOME/gnupg"

# Java, Maven, Gradle
JAVA_TOOL_OPTIONS="-Djava.util.prefs.userRoot=$XDG_CONFIG_HOME/java"
GRADLE_USER_HOME="$XDG_DATA_HOME/gradle"
MAVEN_ARGS="--settings $XDG_CONFIG_HOME/maven/settings.xml"
MAVEN_OPTS="-Dmaven.repo.local=$XDG_DATA_HOME/maven/repository"

# Julia
JULIA_DEPOT_PATH="$XDG_DATA_HOME/julia:$JULIA_DEPOT_PATH"
JULIAUP_DEPOT_PATH="$XDG_DATA_HOME/julia"

# Jupyter
JUPYTER_PLATFORM_DIRS=1

# Maxima
MAXIMA_USERDIR="$XDG_CONFIG_HOME/maxima"

# Mysql
MYSQL_HISTFILE="$XDG_DATA_HOME/mysql_history"

# Node, Npm
NPM_CONFIG_USERCONFIG="$XDG_CONFIG_HOME/npm/npmrc"
NODE_REPL_HISTORY="$XDG_STATE_HOME/node_repl_history"

# Octave
OCTAVE_HISTFILE="$XDG_STATE_HOME/octave-hsts"
OCTAVE_SITE_INITFILE="$XDG_CONFIG_HOME/octave/octaverc"

# Postgres
PSQLRC="$XDG_CONFIG_HOME/pg/psqlrc"
PSQL_HISTORY="$XDG_STATE_HOME/psql_history"
PGSERVICEFILE="$XDG_CONFIG_HOME/pg/pg_service.conf"

# Python, Pip, Ruff
PYTHONUSERBASE="$XDG_DATA_HOME/python"
PYTHONPYCACHEPREFIX="$XDG_CACHE_HOME/python"
PYTHON_HISTORY="$XDG_STATE_HOME/python_history"
RUFF_CACHE_DIR="$XDG_CACHE_HOME/ruff"

# R
R_HOME_USER="$XDG_CONFIG_HOME/R"
R_PROFILE_USER="$XDG_CONFIG_HOME/R/profile"
R_HISTFILE="$XDG_STATE_HOME/R/history"

# Rust, Cargo
#RUSTUP_HOME="$XDG_DATA_HOME/rustup"
CARGO_HOME="$XDG_DATA_HOME/cargo"

# Sage
DOT_SAGE="$XDG_CONFIG_HOME/sage"

# Sqlite
SQLITE_HISTORY="$XDG_STATE_HOME/sqlite_history"

# Tex
TEXMFHOME="$XDG_DATA_HOME/texmf"
TEXMFVAR="$XDG_CACHE_HOME/texlive/texmf-var"
TEXMFCONFIG="$XDG_CONFIG_HOME/texlive/texmf-config"

# Wget
WGETRC="$XDG_CONFIG_HOME/wgetrc"

# ==============================================================================
# 3. Independent System & Hardware Flags
# ==============================================================================

# Electron
ELECTRON_OZONE_PLATFORM_HINT="auto"

# SSH
SSH_ASKPASS=/usr/bin/ksshaskpass
SSH_ASKPASS_REQUIRE=prefer

# Vulkan
ANV_DEBUG="video-decode,video-encode"
